name: auto-release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      npm_version: ${{ steps.version.outputs.npm_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Calculate next version tag
        id: version
        run: |
          DATE_STR=$(date +'%Y%m%d')
          echo "Current date: $DATE_STR"
          
          git fetch --tags --force
          
          TAGS=$(git tag -l "v${DATE_STR}-*")
          if [ -z "$TAGS" ]; then
            NEXT_NO=1
          else
            MAX_NO=$(echo "$TAGS" | sed "s/^v${DATE_STR}-//" | sort -n | tail -n 1)
            NEXT_NO=$((MAX_NO + 1))
          fi
          
          TAG="v${DATE_STR}-${NEXT_NO}"
          NPM_VERSION="${DATE_STR}.${NEXT_NO}.0"
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "npm_version=$NPM_VERSION" >> $GITHUB_OUTPUT
          
          echo "Calculated Tag: $TAG"
          echo "Calculated NPM Version: $NPM_VERSION"

      - name: Create and push Git tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: html/yarn.lock

      - name: Install and Build Frontend
        working-directory: html
        run: |
          corepack enable
          yarn install
          yarn build

      - name: Upload html/dist
        uses: actions/upload-artifact@v7
        with:
          name: html-dist
          path: html/dist

      - name: Upload html.h
        uses: actions/upload-artifact@v7
        with:
          name: html-header
          path: src/html.h

  build-linux:
    runs-on: ubuntu-24.04
    needs: [prepare, build-frontend]
    strategy:
      matrix:
        include:
          - arch: amd64
            target: amd64
            goarch: amd64
          - arch: arm64
            target: arm64
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Download html-dist artifact
        uses: actions/download-artifact@v8
        with:
          name: html-dist
          path: html-dist

      - name: Download html.h artifact
        uses: actions/download-artifact@v8
        with:
          name: html-header
          path: temp-html-header

      - name: Copy html.h to src/
        run: |
          if [ -f temp-html-header/src/html.h ]; then
            cp temp-html-header/src/html.h src/html.h
          elif [ -f temp-html-header/html.h ]; then
            cp temp-html-header/html.h src/html.h
          else
            echo "html.h not found!"
            find temp-html-header -type f
            exit 1
          fi

      - name: Cache cross-compilation stage
        uses: actions/cache@v4
        with:
          path: |
            /opt/cross
            /opt/stage
          key: cross-stage-${{ matrix.target }}-${{ hashFiles('scripts/cross-build.sh') }}
          restore-keys: |
            cross-stage-${{ matrix.target }}-

      - name: Install cross-build packages
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake build-essential cmake curl file libtool

      - name: Build static ttyd
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: ./scripts/cross-build.sh

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('cc-connect/web/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Build cc-connect Web Assets
        run: |
          npm install -g pnpm
          cd cc-connect/web
          pnpm install --frozen-lockfile --dangerously-allow-all-builds
          pnpm build

      - name: Build Go remote-agent
        run: |
          cd agent
          GOOS=linux GOARCH=${{ matrix.goarch }} go build -ldflags "-s -w" -o ../build/remote-agent ./cmd/agent

      - name: Package Release Archive
        run: |
          mkdir -p release-pkg/bin
          cp build/remote-agent release-pkg/bin/
          cp build/ttyd release-pkg/bin/
          cp -r html-dist release-pkg/dist
          tar -czf remote-agent-${{ needs.prepare.outputs.tag }}-linux-${{ matrix.arch }}.tar.gz -C release-pkg .

      - name: Upload Linux Archive
        uses: actions/upload-artifact@v7
        with:
          name: remote-agent-linux-${{ matrix.arch }}
          path: remote-agent-${{ needs.prepare.outputs.tag }}-linux-${{ matrix.arch }}.tar.gz

  build-macos:
    runs-on: macos-latest
    needs: [prepare, build-frontend]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Download html-dist artifact
        uses: actions/download-artifact@v8
        with:
          name: html-dist
          path: html-dist

      - name: Download html.h artifact
        uses: actions/download-artifact@v8
        with:
          name: html-header
          path: temp-html-header

      - name: Copy html.h to src/
        run: |
          if [ -f temp-html-header/src/html.h ]; then
            cp temp-html-header/src/html.h src/html.h
          elif [ -f temp-html-header/html.h ]; then
            cp temp-html-header/html.h src/html.h
          else
            echo "html.h not found!"
            find temp-html-header -type f
            exit 1
          fi

      - name: Install build dependencies via Homebrew
        run: brew install cmake libuv json-c openssl libwebsockets

      - name: Build ttyd natively
        run: |
          mkdir build-ttyd && cd build-ttyd
          cmake -DCMAKE_PREFIX_PATH="/opt/homebrew;/usr/local" -DCMAKE_BUILD_TYPE=Release ..
          make

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('cc-connect/web/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Build cc-connect Web Assets
        run: |
          npm install -g pnpm
          cd cc-connect/web
          pnpm install --frozen-lockfile --dangerously-allow-all-builds
          pnpm build

      - name: Build Go remote-agent
        run: |
          cd agent
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o ../build-ttyd/remote-agent ./cmd/agent

      - name: Package Release Archive
        run: |
          mkdir -p release-pkg/bin
          cp build-ttyd/remote-agent release-pkg/bin/
          cp build-ttyd/ttyd release-pkg/bin/
          cp -r html-dist release-pkg/dist
          tar -czf remote-agent-${{ needs.prepare.outputs.tag }}-darwin-arm64.tar.gz -C release-pkg .

      - name: Upload macOS Archive
        uses: actions/upload-artifact@v7
        with:
          name: remote-agent-darwin-arm64
          path: remote-agent-${{ needs.prepare.outputs.tag }}-darwin-arm64.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [prepare, build-linux, build-macos]
    steps:
      - uses: actions/checkout@v6

      - name: Download all archives
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            remote-agent-*.tar.gz

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Publish to NPM
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN secret is not set. Skipping NPM publishing step."
            echo "To publish automatically, add NPM_TOKEN to your repository secrets."
            exit 0
          fi
          
          cd npm
          
          # Update the version in package.json to NPM SemVer
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            pkg.version = '${{ needs.prepare.outputs.npm_version }}';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          
          # Configure NPM auth and publish
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          npm publish --access public
          
          echo "Successfully published version ${{ needs.prepare.outputs.npm_version }} to NPM registry!"
